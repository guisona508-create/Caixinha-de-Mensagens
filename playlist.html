<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist 💖</title>
    <link rel="stylesheet" href="playlist.css" />
  </head>
  <body>
    <button onclick="voltar()">⬅️ Voltar</button>
    <h1>Musicas que me lembram você 💖</h1>

    <div class="player">
      <img id="capa" src="" class="capa" />
      <p id="nomeMusica">Selecione uma música</p>

      <audio id="audio"></audio>

      <input type="range" id="progresso" value="0" />

      <div class="controles">
        <button onclick="anterior()">
          <ion-icon name="play-skip-back-circle-outline"></ion-icon>
        </button>
        <button onclick="tocar()">
          <ion-icon name="play-circle-outline"></ion-icon>
        </button>
        <button onclick="pausar()">
          <ion-icon name="pause-circle-outline"></ion-icon>
        </button>
        <button onclick="proxima()">
          <ion-icon name="play-skip-forward-circle-outline"></ion-icon>
        </button>
      </div>

      <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5" />
    </div>

    <h3>Playlist</h3>
    <input type="text" id="buscarMusica" placeholder="Digite uma musica...." />
    <ul id="lista"></ul>

    <script src="./playlist.js"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
